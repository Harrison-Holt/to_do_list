<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List | Login</title>

    <link rel="stylesheet" href="login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body class="bg-dark text-white">
    <header class="container-fluid">
        <div class="row align-items-center">
            <div class="col-4">
                <h1>To-Do List</h1>
            </div>
            <div class="col-6"></div>
            <div class="col-2 text-end">
                <a class="btn btn-outline-light" href="https://www.harrisonholt.dev/">Portfolio Homepage</a>
            </div>
        </div>
    </header>
    <main class="container-fluid d-flex flex-column justify-content-center align-items-center min-vh-100 p-0">
            <form class="form-group col-6 d-flex flex-column justify-content-around">
                <h2 class="text-center">Register</h2>
                <label for="username">Username:</label>
                <input type="text" class="form-control" id="username" required>
                <label for="email">Email:</label>
                <input type="email" class="form-control" id="email" placeholder="youdomain@example.com" required>
                <label for="password">Password:</label>
                <input type="password" class="form-control" id="password" required>
                <div class="submit d-flex justify-content-center align-items-center">
                <button type="submit" class="btn btn-primary" id="register_button">Register</button>
                </div>
                <p class="text-center">Already have an account? <a href='login.html'>Login!</a></p>

            </form>
    </main>
    <footer class="text-center py-3">
        <p>&copy;2024 To-Do List</p>
    </footer>
    <script src="register.js"></script>
</body>
</html>
